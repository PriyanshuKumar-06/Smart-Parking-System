{% extends "base.html" %}
{% block title %}Admin Login - SmartPark{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="glass-card auth-card">
    <div class="auth-logo">
      <i class="fa-solid fa-shield-halved" style="font-size:2.5rem;color:var(--accent);"></i>
      <h2>Admin Access</h2>
      <p>Sign in to the administration panel</p>
    </div>

    <form method="POST" action="{{ url_for('admin_login') }}">
      <div class="form-group">
        <label class="form-label"><i class="fa-solid fa-user-tie"></i> Admin Username</label>
        <input type="text" name="username" id="username" class="form-control" placeholder="admin" required/>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fa-solid fa-lock"></i> Password</label>
        <input type="password" name="password" id="admin_password" class="form-control" placeholder="Enter admin password" required/>
      </div>
      <button type="submit" class="btn btn-primary w-100 mt-2">
        <i class="fa-solid fa-right-to-bracket"></i> Admin Login
      </button>
    </form>

    <p class="text-center mt-3" style="font-size:.8rem;">
      <a href="{{ url_for('index') }}" style="color:var(--text-muted);">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
      </a>
    </p>
  </div>
</div>
{% endblock %}
