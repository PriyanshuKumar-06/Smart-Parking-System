{% extends "base.html" %}
{% block title %}Register - SmartPark{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="glass-card auth-card" style="max-width:520px;">
    <div class="auth-logo">
      <i class="fa-solid fa-square-parking" style="font-size:2.5rem;color:var(--primary);"></i>
      <h2>Create Account</h2>
      <p>Join SmartPark and start booking today</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}">
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label"><i class="fa-solid fa-user"></i> Full Name</label>
          <input type="text" name="name" id="name" class="form-control" placeholder="John Doe" required/>
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fa-solid fa-phone"></i> Phone Number</label>
          <input type="tel" name="phone" id="phone" class="form-control" placeholder="9876543210" required/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fa-solid fa-envelope"></i> Email Address</label>
        <input type="email" name="email" id="email" class="form-control" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fa-solid fa-car"></i> Vehicle Number</label>
        <input type="text" name="vehicle_number" id="vehicle_number" class="form-control" placeholder="MH01AB1234" required/>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fa-solid fa-lock"></i> Password</label>
        <input type="password" name="password" id="password" class="form-control" placeholder="Create a strong password" required/>
      </div>
      <button type="submit" class="btn btn-primary w-100 mt-2">
        <i class="fa-solid fa-user-plus"></i> Create Account
      </button>
    </form>

    <div class="divider mt-2">or</div>
    <p class="text-center text-muted" style="font-size:.875rem;">
      Already have an account?
      <a href="{{ url_for('login') }}" style="color:var(--primary);font-weight:600;">Login here</a>
    </p>
  </div>
</div>
{% endblock %}
